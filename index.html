<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card Builder</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>

    <main class="container">
        <section class="panel form-panel">
            <h1>Profile Builder</h1>
            <form id="profileForm">
                <fieldset>
                    <legend>Personal Details</legend>
                    
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" placeholder="Enter name" required>

                    <label for="jobTitle">Job Title *</label>
                    <input type="text" id="jobTitle" placeholder="e.g. Frontend Developer" required>

                    <label for="bio">Short Bio</label>
                    <textarea id="bio" rows="3" placeholder="Tell us about yourself..."></textarea>

                    <label for="avatarColor">Avatar Theme Color</label>
                    <input type="color" id="avatarColor" value="#4a90e2">

                    <div class="skills-container">
                        <p>Skills (Select your stack):</p>
                        <div class="checkbox-group">
                            <label><input type="checkbox" name="skills" value="HTML"> HTML</label>
                            <label><input type="checkbox" name="skills" value="CSS"> CSS</label>
                            <label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>
                            <label><input type="checkbox" name="skills" value="React"> React</label>
                        </div>
                    </div>

                    <button type="submit" id="generateBtn">Generate Card</button>
                    <div id="errorArea" class="error-msg"></div>
                </fieldset>
            </form>
        </section>

        <section class="panel preview-panel">
            <div class="card" id="profileCard">
                <div id="cardAvatar" class="avatar"></div>
                <h2 class="name-text" id="displayName">Your Name</h2>
                <p id="displayJob" class="job-title">Job Title</p>
                <p id="displayBio">Your bio will appear here after you generate the card.</p>
                <div id="skillsTags" class="tags"></div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
