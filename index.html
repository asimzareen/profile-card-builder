<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Card Builder</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <main class="container">
        <section class="panel form-panel">
            <form id="profileForm">
                <fieldset>
                    <legend>User Information</legend>
                    
                    <label for="fullName">Full Name *</label>
                    <input type="text" id="fullName" name="fullName" required>

                    <label for="jobTitle">Job Title *</label>
                    <input type="text" id="jobTitle" name="jobTitle" required>

                    <label for="bio">Bio</label>
                    <textarea id="bio" name="bio" rows="3"></textarea>

                    <label for="avatarColor">Avatar Color</label>
                    <input type="color" id="avatarColor" value="#3498db">

                    <div class="skills-group">
                        <p>Skills (Select at least one):</p>
                        <label><input type="checkbox" name="skills" value="HTML"> HTML</label>
                        <label><input type="checkbox" name="skills" value="CSS"> CSS</label>
                        <label><input type="checkbox" name="skills" value="JavaScript"> JavaScript</label>
                        <label><input type="checkbox" name="skills" value="React"> React</label>
                    </div>

                    <button type="submit" id="generateBtn">Generate Card</button>
                    <p id="error-message" class="error-hidden">Please fill in required fields.</p>
                </fieldset>
            </form>
        </section>

        <section class="panel preview-panel">
            <div class="card" id="profileCard">
                <div class="avatar" id="cardAvatar"></div>
                <h2 class="title" id="cardName">Your Name</h2>
                <p class="job-text" id="cardJob">Job Title</p>
                <p class="bio-text" id="cardBio">Your bio will appear here...</p>
                <div class="skills-tags" id="cardSkills">
                    </div>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
